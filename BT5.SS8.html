<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bài tập 2</title>
    <link rel="stylesheet" href="./cssfile11.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>
    <div class="container">
    <header class="top">
        <img src="./logo.png">
        <div class="right-header">
            <span class="currency"><b>USD</b></span>
            <img class="logo" src="./Flag_of_the_United_States.svg.png" alt="US" class="flag">
        <div class="account">
            <img src="https://i.pravatar.cc/40" class="avatar">
            <span><b>Delowar</b></span>
            <span class="arrow">▼</span>
        </div>
        </div>
    </header>
        <nav>
            <a href="./Image/bài 2 trang chủ.htm">Home</a>
            <span class="material-symbols-outlined">chevron_right</span>
            <a href="./Image/bài 2 giới thiệu.htm">Hotel List</a>
            <span class="material-symbols-outlined">chevron_right</span>
            <a href="./Image/bài 2 giới thiệu.htm">Hotel Details</a>
            <span class="material-symbols-outlined">chevron_right</span>
            <a href="./Image/bài 2 sản phẩm 2.htm">Confirm and Pay</a>
        </nav>
    </div>
    <div class="middle">
        <h1>Confirm your Book</h1>
        <h2>Your tour</h2>
        <div class="info-box">
            <div class="left">
                <p class="label">Date</p>
                <p class="value">June 27 - 30, 2020</p>
            </div>
            <span class="material-symbols-outlined edit">edit</span>
        </div>
        <div class="info-box">
            <div class="left">
                <p class="label">Traveller</p>
                <p class="value">1 Passenger</p>
            </div>
            <span class="material-symbols-outlined edit">edit</span>
        </div>
     <div class="credit-card">

  <h2>Credit Cards</h2>
  <div class="card-types">
    <img src="https://img.icons8.com/color/48/mastercard.png" alt="mastercard">
    <img src="https://img.icons8.com/color/48/paypal.png" alt="paypal">
    <img src="https://img.icons8.com/color/48/visa.png" alt="visa">
  </div>
  <div class="cards">
    <img src="./card 1.png" class="card-img">
    <img src="./card 2.png" class="card-img">
</div>
  <form class="form">
    <div class="form1">
    <label>Card Number</label><br><br>
    <input type="text" placeholder="5884 6241 4444 3333"><br><br>
    <div class="row">
      <div class="field">
        <label>Expiry Date</label><br><br>
        <input type="text" placeholder="MM/YY"><br><br>
      </div>
      <div class="field">
        <label>CVC/CVV</label><br><br>
        <input type="text" placeholder="***"><br><br>
      </div>
    </div>
    </div>
    <div class="checkbox">
      <input type="checkbox" id="save"><label for="save">Save Card</label><br><br>
    </div>
    <button type="submit">Confirm and reserve</button>
  </form>
</div>   
</div>
</body>
</html>
